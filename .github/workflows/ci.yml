name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: everest
          POSTGRES_PASSWORD: everest
          POSTGRES_DB: everest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U everest"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://everest:everest@localhost:5432/everest_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check backend
      - name: Types
        run: mypy backend/app
      - name: Tests
        run: pytest -q
      - name: Eval gate (judge quality regression)
        run: python -m app.eval.gate
        env:
          PYTHONPATH: backend
