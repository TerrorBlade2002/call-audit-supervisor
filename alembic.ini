[alembic]
script_location = backend/migrations
prepend_sys_path = backend
# DB URL is injected at runtime from settings (see migrations/env.py); this is a placeholder.
sqlalchemy.url = postgresql+asyncpg://everest:everest@localhost:5432/everest

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
